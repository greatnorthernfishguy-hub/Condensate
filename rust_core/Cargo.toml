[package]
name = "condensate_core"
version = "0.1.0"
edition = "2024"
description = "Living memory manager — Rust core with PyO3 bindings"
license = "AGPL-3.0"

[lib]
name = "condensate_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.24", features = ["extension-module"] }
lz4_flex = "0.11"

[profile.release]
opt-level = 3
lto = true
